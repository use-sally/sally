name: publish-images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/use-sally/sally-api
          - name: web
            context: .
            dockerfile: apps/web/Dockerfile
            image: ghcr.io/use-sally/sally-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
          echo "git_sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SALLY_VERSION=${{ steps.buildmeta.outputs.version }}
            SALLY_GIT_SHA=${{ github.sha }}
            SALLY_BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
            NEXT_PUBLIC_SALLY_VERSION=${{ steps.buildmeta.outputs.version }}
            NEXT_PUBLIC_SALLY_GIT_SHA=${{ steps.buildmeta.outputs.git_sha_short }}
            NEXT_PUBLIC_SALLY_BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
